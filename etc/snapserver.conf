# snapserver.conf — reads PCM from the FIFO that Kodi writes to.
#
# The pipe source must match the sample format Kodi/ALSA outputs:
# 48000 Hz, 16-bit, stereo (S16_LE). See etc/asound.conf.

[server]

[http]
doc_root = /usr/share/snapserver/snapweb

[tcp]

[stream]
# Read raw PCM from the named pipe (written by Kodi via ALSA file plugin)
stream = pipe:///tmp/music/upnpfifo?name=upnp&sampleformat=48000:16:2
sampleformat = 48000:16:2
codec = flac

[logging]
