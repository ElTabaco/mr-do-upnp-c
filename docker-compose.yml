services:
  mr-do-upnp-c:
    image: riemerk/mr-do-upnp-c:latest
    container_name: mr-do-upnp-c
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - UPNP_NAME=mr-do UPnP
    ports:
      # UPnP HTTP control port
      - "49494:49494/tcp"
      # SSDP discovery (UDP multicast 239.255.255.250)
      - "1900:1900/udp"
    # hostNetwork is required for UPnP/SSDP discovery to work.
    # Uncomment the line below instead of `ports:` if your Docker
    # setup supports it.
    # network_mode: host
    volumes:
      - ./etc/asound.conf:/etc/asound.conf:ro
      - ./tmp/music/:/tmp/music
    hostname: mr-do-upnp-c
    restart: unless-stopped
