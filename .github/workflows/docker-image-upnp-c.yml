name: Docker Image CI upnp-c

on:
  push:
    branches: ["main"]
    paths:
      - "docker/**"
      - "settings/**"
      - "etc/**"
      - "build.sh"
      - ".github/workflows/docker-image-upnp-c.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "docker/**"
      - "settings/**"
      - "etc/**"
      - ".github/workflows/docker-image-upnp-c.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: get-version
        run: |
          # Derive version from git tags (e.g. v0.2.0 → 0.2.0).
          # Falls back to 0.0.0-dev if no tags exist.
          VERSION=$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//' | cut -d- -f1)
          [ -z "$VERSION" ] && VERSION="0.0.0-dev"
          echo "upnp_version=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Build and push mr-do-upnp-c (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mr-do-upnp-c:latest
            ${{ secrets.DOCKER_USERNAME }}/mr-do-upnp-c:${{ env.upnp_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
